<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>JengaTrack - Construction Budget Tracking</title>
    <meta name="description" content="Track construction expenses, manage tasks, and monitor budgets via WhatsApp or web dashboard. Built for Ugandan contractors." />
    <!-- Brand Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      (function() {
        try {
          var t = localStorage.getItem('jenga_theme');
          document.documentElement.classList.add(t === 'light' ? 'light' : 'dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
